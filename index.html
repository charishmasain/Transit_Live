<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart College Transport</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <!-- Icons (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Floating Glass Panel -->
        <aside class="glass-panel">
            <header class="panel-header">
                <div class="brand">
                    <div class="brand-icon">
                        <i data-lucide="bus-front"></i>
                    </div>
                    <h1>Transit Live</h1>
                </div>
                
                <div class="role-toggle-wrapper">
                    <span id="roleLabel" class="role-text active">Student</span>
                    <label class="switch">
                        <input type="checkbox" id="roleSwitch">
                        <span class="slider round"></span>
                    </label>
                    <span class="role-text">Faculty</span>
                </div>
            </header>

            <div class="route-card">
                <div class="search-container">
                    <div class="input-box" id="searchBox">
                        <i data-lucide="search"></i>
                        <input type="text" id="busSearch" placeholder="Search Bus No (try 401, 204, 105)" autocomplete="off">
                    </div>
                    <div class="input-box">
                        <i data-lucide="map-pin"></i>
                        <select id="destSelect" disabled>
                            <option value="">Select My Stop...</option>
                        </select>
                        <i data-lucide="chevron-down" class="dropdown-icon" style="position:absolute; right:16px; width:16px; pointer-events:none; color: #94A3B8;"></i>
                    </div>
                </div>

                <div id="emptyState" class="empty-state">
                    <i data-lucide="route"></i>
                    <p>Enter a bus number to view live tracking and select your stop.</p>
                </div>

                <div id="busInfoDetails" style="display: none; flex-direction: column; gap: 24px;">
                    <div class="card-top" style="margin-top: -8px;">
                        <div class="route-badge">
                            <span class="dot live-dot active" style="margin-right: 8px;"></span>
                            <span id="displayBusName">Bus 401</span>
                        </div>
                        <span class="status-pill status-active" id="statusBadge">Approaching</span>
                    </div>
                    
                    <div class="grid-stats">
                        <div class="stat-box">
                            <span class="stat-label">Next Stop</span>
                            <span class="stat-value" id="nextStopText" style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="Loading...">--</span>
                        </div>
                        <div class="stat-box highlight-box">
                            <span class="stat-label">Arrival at My Stop</span>
                            <div class="stat-value highlight"><span id="timeToCampus">--</span><span class="unit">m</span></div>
                        </div>
                    </div>

                    <div class="trip-details">
                        <div class="location-flow">
                            <div class="flow-item">
                                <div class="flow-icon origin"></div>
                                <div class="flow-text">
                                    <span class="label">Origin</span>
                                    <span class="value" id="originText">Main Campus</span>
                                </div>
                            </div>
                            <div class="flow-line"></div>
                            <div class="flow-item" id="destFlowItem" style="opacity: 0.5;">
                                <div class="flow-icon dest"></div>
                                <div class="flow-text">
                                    <span class="label">My Stop</span>
                                    <span class="value" id="destText">Select my stop above</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="notification-banner success" id="notificationText">
                        <i data-lucide="info"></i>
                        <span>Bus is currently navigating to your campus.</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Map -->
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
